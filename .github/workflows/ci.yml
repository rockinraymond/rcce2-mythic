name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # BlitzForge submodule; nested reshade deps are not needed for
          # compile/test so we skip recursive to keep the checkout fast.
          submodules: true

      # Cache the BlitzForge runtime binaries keyed on the submodule SHA.
      # rcce2 PRs rarely change the BlitzForge pointer, so the common-case
      # CI run avoids the ~3min MSBuild step entirely.
      - name: Resolve BlitzForge submodule SHA
        id: bf
        shell: bash
        run: echo "sha=$(git -C compiler/BlitzForge rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore BlitzForge bin from cache
        id: bf-cache
        uses: actions/cache@v4
        with:
          path: |
            compiler/BlitzForge/bin/blitzcc.exe
            compiler/BlitzForge/bin/runtime.dll
            compiler/BlitzForge/bin/linker.dll
            compiler/BlitzForge/bin/debugger.dll
          key: blitzforge-bin-${{ runner.os }}-${{ steps.bf.outputs.sha }}

      - name: Add MSBuild to PATH
        if: steps.bf-cache.outputs.cache-hit != 'true'
        uses: microsoft/setup-msbuild@v2

      - name: Build BlitzForge compiler
        if: steps.bf-cache.outputs.cache-hit != 'true'
        shell: cmd
        working-directory: compiler/BlitzForge
        run: |
          call compile.bat
          if errorlevel 1 exit /b %errorlevel%

      - name: Verify BlitzForge binaries are present
        shell: cmd
        run: |
          if not exist compiler\BlitzForge\bin\blitzcc.exe (
            echo blitzcc.exe missing after build/restore
            exit /b 1
          )

      - name: Compile project
        shell: cmd
        run: |
          call compile.bat
          if errorlevel 1 exit /b %errorlevel%

      - name: Run test suite
        shell: cmd
        run: test.bat

      # The Rust client (client-rs/) ships its own deterministic unit + parser
      # robustness tests. windows-latest has the Rust toolchain preinstalled.
      # Gate ALL four logic crates on every PR:
      #   - rcce-data / rcce-net: parsers + wire codec — the "soft-fail, never
      #     panic on hostile input" invariant must not regress.
      #   - rcce-render / rcce-client: despite pulling wgpu/winit, they carry
      #     ~150 PURELY HEADLESS unit tests (overlay projection math, world.rs
      #     packet-handler regressions, HUD/menu geometry, the EnetTransport Send
      #     contract, etc.) that run with no GPU/window in <1s. Compiling them
      #     here also makes CI catch a build break in the client/renderer (the
      #     crates the project changes most) on a fresh checkout. The one-time
      #     wgpu/winit compile is amortised by the cache step below (which already
      #     lists client-rs/target). The i686-only rcenet-ffi-probe is excluded.
      - name: Cache Rust build (client-rs)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            client-rs/target
          key: cargo-${{ runner.os }}-${{ hashFiles('client-rs/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Run Rust client tests (logic crates)
        shell: bash
        working-directory: client-rs
        run: cargo test -p rcce-data -p rcce-net -p rcce-render -p rcce-client --locked

      # Clippy gate over the four tested crates plus their vendored enet-sys
      # transport (lib + bins + tests via --all-targets), failing on ANY lint
      # (`-D warnings`). enet-sys is included explicitly so the gate is
      # deterministic: it's a path-dep of rcce-net, so on a cache MISS clippy
      # would lint it anyway — gating it directly means a green run can't depend
      # on whether the cache happened to skip it. The workspace allows three
      # lints that fight idiomatic graphics/parser code (too_many_arguments,
      # type_complexity, field_reassign_with_default — see client-rs/Cargo.toml
      # [workspace.lints.clippy]); everything else is denied. The i686-only
      # rcenet-ffi-probe is excluded (CI is x86_64). This gate already caught
      # two real correctness bugs (a dead `|| true` find-predicate and an
      # approximate-TAU literal).
      - name: Clippy (Rust client logic crates)
        shell: bash
        working-directory: client-rs
        run: cargo clippy -p rcce-data -p rcce-net -p rcce-render -p rcce-client -p enet-sys --all-targets --locked -- -D warnings

      # Two reference docs (the wire-protocol packet catalog and the BVM
      # scripting-API catalog) are produced by generator scripts that read
      # line numbers + signatures out of the source. Their `--check` mode
      # exits non-zero when the committed doc no longer matches a fresh
      # regeneration. Without this gate, every PR that shifts a packet
      # handler or BVM function silently leaves stale `:LINE` references
      # in the docs -- and the line numbers look authoritative because the
      # docs carry a "Do not edit by hand -- rerun the generator" banner.
      # Contributors who touch ServerNet.bb / ClientNet.bb / Packets.bb /
      # RC_Standard_Invoker.bb / ScriptingCommands.bb must rerun the two
      # generators (`bash scripts/gen_packet_index.sh` +
      # `bash scripts/gen_bvm_reference.sh`) and commit the regenerated
      # output, or this step fails the PR with a diff message pointing at
      # the regeneration command.
      - name: Verify generated docs are up to date
        shell: bash
        run: |
          bash scripts/gen_packet_index.sh --check
          bash scripts/gen_bvm_reference.sh --check
